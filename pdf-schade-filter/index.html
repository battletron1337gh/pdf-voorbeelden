<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Schade Filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            background: #f8f9ff;
        }
        .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .progress-container { display: none; margin-top: 20px; }
        .progress-container.show { display: block; }
        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .preview-area {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .preview-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #f44336;
        }
        .log-container {
            margin-top: 20px;
            padding: 15px;
            background: #263238;
            color: #aed581;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 PDF Schade Filter</h1>
            <p>Verwijder schade-regels uit onderhoudshistorie</p>
        </div>
        
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div style="font-size: 1.2rem;">Klik om PDF te uploaden</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf">
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Bezig...</div>
            </div>
            
            <button class="btn" id="processBtn" disabled>Analyseer PDF</button>
            <button class="btn" id="downloadBtn" style="display: none;">⬇️ Download PDF</button>
            
            <div class="preview-area" id="previewArea" style="display: none;">
                <h3>Te verwijderen regels:</h3>
                <div id="previewList"></div>
            </div>
            
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const damageKeywords = ['schade', 'botsing', 'collision', 'reparatie', 'herstel', 'damage', 'ongeval', 'accident', 'aanrijding', 'plaatwerk', 'lakwerk'];
        
        let currentFile = null;
        let damageRows = [];
        
        document.getElementById('uploadArea').addEventListener('click', () => 
            document.getElementById('fileInput').click());
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                currentFile = e.target.files[0];
                document.getElementById('processBtn').disabled = false;
                log('Bestand: ' + currentFile.name);
            }
        });
        
        document.getElementById('processBtn').addEventListener('click', analyzePDF);
        document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
        
        function log(msg) {
            const container = document.getElementById('logContainer');
            container.style.display = 'block';
            container.innerHTML += `<div>${msg}</div>`;
        }
        
        function updateProgress(pct, text) {
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressContainer').classList.add('show');
        }
        
        async function analyzePDF() {
            if (!currentFile) return;
            
            document.getElementById('processBtn').disabled = true;
            damageRows = [];
            
            try {
                updateProgress(10, 'PDF laden...');
                
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdfData = new Uint8Array(arrayBuffer);
                
                const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
                log(`PDF: ${pdf.numPages} pagina's`);
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    updateProgress(10 + (i / pdf.numPages) * 70, `Pagina ${i}...`);
                    
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const { width, height } = page.getViewport({ scale: 1 });
                    
                    // Groepeer per regel
                    const rows = {};
                    for (const item of textContent.items) {
                        const y = Math.round(item.transform[5]);
                        if (!rows[y]) rows[y] = [];
                        rows[y].push(item);
                    }
                    
                    // Vind schade regels
                    for (const [y, items] of Object.entries(rows)) {
                        const rowText = items.map(i => i.str).join(' ').toLowerCase();
                        if (damageKeywords.some(kw => rowText.includes(kw))) {
                            const minY = Math.min(...items.map(i => i.transform[5]));
                            const maxY = Math.max(...items.map(i => i.transform[5] + (i.height || 12)));
                            
                            // Bereken de hoogte van de regel
                            const rowHeight = maxY - minY;
                            
                            damageRows.push({
                                page: i,
                                y: minY,
                                height: rowHeight,
                                text: items.map(i => i.str).join(' '),
                                pageWidth: width,
                                pageHeight: height
                            });
                        }
                    }
                    
                    page.cleanup();
                }
                
                updateProgress(100, 'Klaar!');
                showResults();
                document.getElementById('downloadBtn').style.display = 'inline-block';
                document.getElementById('processBtn').disabled = false;
                
            } catch (err) {
                log('Fout: ' + err.message);
                document.getElementById('processBtn').disabled = false;
            }
        }
        
        function showResults() {
            const preview = document.getElementById('previewArea');
            const list = document.getElementById('previewList');
            
            preview.style.display = 'block';
            
            if (damageRows.length === 0) {
                list.innerHTML = '<p>✅ Geen schade-regels gevonden!</p>';
                return;
            }
            
            list.innerHTML = damageRows.map(row => `
                <div class="preview-item">
                    <strong>Pagina ${row.page}:</strong> ${row.text.substring(0, 100)}...
                </div>
            `).join('');
            
            log(`${damageRows.length} regels gevonden`);
        }
        
        async function downloadPDF() {
            if (!currentFile || damageRows.length === 0) {
                // Geen schade, download origineel
                if (currentFile) {
                    const url = URL.createObjectURL(currentFile);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = currentFile.name;
                    link.click();
                    URL.revokeObjectURL(url);
                }
                return;
            }
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').textContent = 'Bezig...';
            
            try {
                log('PDF maken...');
                
                // Laad originele PDF
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                
                // Groepeer damage rows per pagina
                const rowsByPage = {};
                for (const row of damageRows) {
                    if (!rowsByPage[row.page]) rowsByPage[row.page] = [];
                    rowsByPage[row.page].push(row);
                }
                
                // Voor elke pagina met schade
                for (const [pageNum, rows] of Object.entries(rowsByPage)) {
                    const page = pdfDoc.getPages()[parseInt(pageNum) - 1];
                    const { width, height } = page.getSize();
                    
                    // Sorteer van boven naar beneden
                    rows.sort((a, b) => b.y - a.y);
                    
                    for (const row of rows) {
                        // Converteer Y coordinaat (PDF.js Y is vanaf onderen)
                        // PDF.js Y is vanaf onderen, pdf-lib Y is ook vanaf onderen
                        // row.y is de onderkant van de tekst in PDF.js coordinaten
                        const pdfY = height - row.y - 10;
                        
                        // Teken witte rechthoek - alleen de regel zelf, niet erboven/eronder
                        page.drawRectangle({
                            x: 0,
                            y: pdfY,
                            width: width,
                            height: row.height + 20,  // Iets extra voor zekerheid
                            color: PDFLib.rgb(1, 1, 1),
                            borderWidth: 0
                        });
                    }
                    
                    log(`Pagina ${pageNum}: ${rows.length} regels verwijderd`);
                }
                
                // Sla op
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = 'onderhoudshistorie_schoon.pdf';
                link.click();
                
                URL.revokeObjectURL(url);
                log('Klaar!', 'success');
                
            } catch (err) {
                log('Fout: ' + err.message);
            } finally {
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = '⬇️ Download PDF';
            }
        }
    </script>
</body>
</html>
