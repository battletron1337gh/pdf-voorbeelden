<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Schade Filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        .upload-area:hover { border-color: #764ba2; background: #f0f2ff; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            margin-right: 10px;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .progress-container { display: none; margin-top: 20px; }
        .progress-container.show { display: block; }
        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }
        .keywords {
            margin-top: 20px;
            padding: 15px;
            background: #fff3e0;
            border-radius: 8px;
        }
        .keyword {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            margin: 4px;
        }
        .preview-area {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .preview-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #ccc;
        }
        .preview-item.damage { border-left-color: #f44336; background: #ffebee; }
        .preview-item.keep { border-left-color: #4caf50; background: #e8f5e9; }
        .log-container {
            margin-top: 20px;
            padding: 15px;
            background: #263238;
            color: #aed581;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 PDF Schade Filter</h1>
            <p>Verwijder schade-regels uit onderhoudshistorie PDF's</p>
        </div>
        
        <div class="card">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div style="font-size: 1.2rem;">Klik om PDF te uploaden</div>
                <div style="color: #666; font-size: 0.9rem;">Onderhoudshistorie PDF</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf">
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Bezig...</div>
            </div>
            
            <div class="keywords">
                <h3>🚫 Herkende schade-trefwoorden:</h3>
                <div id="keywordList"></div>
            </div>
            
            <button class="btn" id="processBtn" disabled>Analyseer PDF</button>
            <button class="btn" id="downloadBtn" style="display: none;">⬇️ Download PDF zonder schade</button>
            
            <div class="preview-area" id="previewArea" style="display: none;">
                <h3>Gevonden regels:</h3>
                <div id="previewList"></div>
            </div>
            
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const damageKeywords = [
            'schade', 'botsing', 'collision', 'reparatie', 'herstel',
            'damage', 'ongeval', 'accident', 'ramp', 'totaal',
            'aanrijding', 'aanvaring', 'impact', 'plaatwerk', 'lakwerk'
        ];
        
        let currentFile = null;
        let damageItems = [];
        let originalPdfBytes = null;
        
        document.getElementById('keywordList').innerHTML = 
            damageKeywords.map(kw => `<span class="keyword">${kw}</span>`).join('');
        
        document.getElementById('uploadArea').addEventListener('click', () => 
            document.getElementById('fileInput').click());
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                currentFile = e.target.files[0];
                document.getElementById('processBtn').disabled = false;
                log('Bestand: ' + currentFile.name);
            }
        });
        
        document.getElementById('processBtn').addEventListener('click', analyzePDF);
        document.getElementById('downloadBtn').addEventListener('click', downloadCleanPDF);
        
        function log(msg) {
            const container = document.getElementById('logContainer');
            container.style.display = 'block';
            container.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        }
        
        function updateProgress(pct, text) {
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressContainer').classList.add('show');
        }
        
        async function analyzePDF() {
            if (!currentFile) return;
            
            document.getElementById('processBtn').disabled = true;
            damageItems = [];
            
            try {
                updateProgress(10, 'PDF laden...');
                
                const arrayBuffer = await currentFile.arrayBuffer();
                originalPdfBytes = new Uint8Array(arrayBuffer);
                
                const pdf = await pdfjsLib.getDocument({ data: originalPdfBytes }).promise;
                log(`PDF geladen: ${pdf.numPages} pagina's`);
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    updateProgress(10 + (i / pdf.numPages) * 70, `Pagina ${i} analyseren...`);
                    
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    for (const item of textContent.items) {
                        const text = item.str.toLowerCase();
                        const hasDamage = damageKeywords.some(kw => text.includes(kw));
                        
                        if (hasDamage) {
                            damageItems.push({
                                page: i,
                                text: item.str,
                                x: item.transform[4],
                                y: item.transform[5],
                                width: item.width,
                                height: item.height || 12
                            });
                        }
                    }
                    
                    page.cleanup();
                }
                
                updateProgress(100, 'Klaar!');
                
                showResults();
                
                document.getElementById('downloadBtn').style.display = 'inline-block';
                document.getElementById('processBtn').disabled = false;
                
            } catch (err) {
                log('Fout: ' + err.message);
                document.getElementById('processBtn').disabled = false;
            }
        }
        
        function showResults() {
            const preview = document.getElementById('previewArea');
            const list = document.getElementById('previewList');
            
            preview.style.display = 'block';
            
            if (damageItems.length === 0) {
                list.innerHTML = '<p>✅ Geen schade-regels gevonden!</p>';
                return;
            }
            
            list.innerHTML = damageItems.map(item => `
                <div class="preview-item damage">
                    <strong>Pagina ${item.page}:</strong> ${escapeHtml(item.text)}
                    <br><small style="color: #666;">Positie: ${Math.round(item.x)}, ${Math.round(item.y)}</small>
                </div>
            `).join('');
            
            log(`${damageItems.length} schade items gevonden`);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function downloadCleanPDF() {
            if (!originalPdfBytes) return;
            
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').textContent = 'Bezig...';
            
            try {
                log('PDF aanmaken...');
                
                // Laad originele PDF
                const pdfDoc = await PDFLib.PDFDocument.load(originalPdfBytes);
                const pages = pdfDoc.getPages();
                
                // Voor elke pagina met schade items
                const pagesWithDamage = [...new Set(damageItems.map(i => i.page))];
                
                for (const pageNum of pagesWithDamage) {
                    const page = pages[pageNum - 1];
                    const { width, height } = page.getSize();
                    
                    // Vind alle schade items op deze pagina
                    const itemsOnPage = damageItems.filter(i => i.page === pageNum);
                    
                    for (const item of itemsOnPage) {
                        // Teken witte rechthoek over de schade tekst
                        // PDF coördinaten: y is vanaf onderen, dus moeten we omrekenen
                        const pdfY = height - item.y - (item.height || 12);
                        
                        page.drawRectangle({
                            x: item.x - 2,
                            y: pdfY - 2,
                            width: item.width + 4,
                            height: (item.height || 12) + 4,
                            color: PDFLib.rgb(1, 1, 1), // Wit
                            borderColor: PDFLib.rgb(1, 1, 1),
                            borderWidth: 0,
                        });
                    }
                    
                    log(`Pagina ${pageNum}: ${itemsOnPage.length} items verwijderd`);
                }
                
                // Sla op
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = 'onderhoudshistorie_zonder_schade.pdf';
                link.click();
                
                URL.revokeObjectURL(url);
                log('PDF gedownload!', 'success');
                
            } catch (err) {
                log('Fout: ' + err.message);
            } finally {
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').textContent = '⬇️ Download PDF zonder schade';
            }
        }
    </script>
</body>
</html>
